[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -q
markers =
    slow: tests lents (optionnel, à exclure avec -m "not slow")
    integration: tests d'intégration
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
